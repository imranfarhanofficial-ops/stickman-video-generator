<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Video Generator</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:600px;
    text-align:center;
}

h1{
    font-size:32px;
}

textarea{
    width:100%;
    height:180px;
    border-radius:12px;
    padding:15px;
    font-size:18px;
    margin-top:20px;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:#00c853;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#00a844;
}
</style>

</head>

<body>

<div class="container">

<h1>🎬 Stickman Video Generator</h1>

<p>Write your scene below</p>

<textarea id="prompt" placeholder="Example: A stickman walks into a classroom..."></textarea>

<button onclick="generateScene()">
Generate Scene
</button>

</div>

<script>

function generateScene(){

let text=document.getElementById("prompt").value;

alert("Your Prompt:\\n\\n"+text);

}

</script>

</body>
</html>
